<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello DevOps World</title>

    <!-- Simple CSS styling -->
    <style>
        body {
            background: #0d1117;
            color: #58a6ff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 150px;
        }
        h1 {
            font-size: 3rem;
        }
        .feature-box {
            margin-top: 30px;
            color: #c9d1d9;
            font-size: 1.2rem;
        }
    </style>

    <!-- Auto-refresh every 5 seconds (DevOps CI/CD-style) -->
    <meta http-equiv="refresh" content="5" />
</head>

<body>
    <h1>Hello DevOps World! 🚀</h1>

    <div class="feature-box">
        <p>✔ Auto-refresh like live deployments</p>
        <p>✔ Browser console logs (simulate monitoring)</p>
        <p>✔ Clean structure—easy to deploy in Docker / Nginx</p>
    </div>

    <script>
        // Simple telemetry-like logging
        console.log("DevOps page loaded at: " + new Date().toLocaleString());
    </script>
</body>
</html>
