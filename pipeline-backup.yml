# backup of previous pipeline configuration (before switching to AzureCLI kubectl step)
trigger:
  branches:
    include:
      - master

variables:
  # Update these variables with your Azure details
  azureSubscription: 'arm-connection'  # Service connection name in Azure DevOps
  resourceGroup: 'Kubernetes-Learning'
  aksCluster: 'dryrun-cluster'
  acrName: 'mycontainerregistry0103'
  imageName: 'static-app'
  imageTag: 'latest'

stages:
  - stage: Build
    displayName: 'Build Docker Image'
    jobs:
      - job: Build
        displayName: 'Build and Push Image'
        steps:
          - task: AzureCLI@2
            displayName: 'Login to ACR'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az acr login --name $(acrName)

          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: 'build'
              repository: '$(acrName).azurecr.io/$(imageName)'
              dockerfile: 'Dockerfile'
              tags: '$(imageTag)'

          - task: Docker@2
            displayName: 'Push Docker Image to ACR'
            inputs:
              command: 'push'
              repository: '$(acrName).azurecr.io/$(imageName)'
              tags: '$(imageTag)'

  - stage: Deploy
    displayName: 'Deploy to AKS'
    dependsOn: Build
    jobs:
      - job: Deploy
        displayName: 'Deploy Application'
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'Get AKS Credentials'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az aks get-credentials --resource-group $(resourceGroup) --name $(aksCluster) --overwrite-existing

          - task: Kubernetes@1
            displayName: 'Deploy to Kubernetes'
            inputs:
              connectionType: 'Azure Resource Manager'
              azureSubscriptionEndpoint: '$(azureSubscription)'
              azureResourceGroup: '$(resourceGroup)'
              kubernetesCluster: '$(aksCluster)'
              command: 'apply'
              useConfigurationFile: true
              configuration: |
                manifests/deployment.yaml
                manifests/service.yaml